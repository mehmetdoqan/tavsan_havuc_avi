<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🐰 Havuç Avı</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #a8e063, #56ab2f);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
    }
    .phone {
      width: 360px;
      background: white;
      border-radius: 36px;
      border: 8px solid #222;
      overflow: hidden;
      position: relative;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }
    .scr { width: 100%; display: none; flex-direction: column; }
    .scr.on { display: flex; }
    .map-header {
      padding: 16px 20px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(180deg,#b8f0a0,#e8f5d0);
    }
    .lvl-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      padding: 10px 14px 20px;
      overflow-y: auto;
      max-height: 560px;
      background: linear-gradient(180deg,#e8f5d0 0%,#f5e6c8 100%);
    }
    .lc {
      height: 54px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      background: #ddd;
      color: #aaa;
      cursor: not-allowed;
      position: relative;
    }
    .lc.open { background: white; border: 2.5px solid #2196F3; color: #2196F3; cursor: pointer; }
    .lc.done { background: #e8f5e9; border: 2.5px solid #4CAF50; color: #4CAF50; }
    .lc.done::after { content: '⭐'; position: absolute; bottom: 1px; font-size: 9px; }
    .play-header {
      padding: 10px 14px 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(180deg,#b8f0a0,#d4f0b0);
    }
    .board {
      display: grid;
      grid-template-columns: repeat(5, 54px);
      grid-template-rows: repeat(5, 54px);
      gap: 3px;
      padding: 4px;
      border-radius: 12px;
      margin: 4px auto;
      position: relative;
      border: 4px solid #8BC34A;
      background: #8BC34A;
    }
    .sq {
      width: 54px;
      height: 54px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }
    .sq-grass { background: #c8e6a0; }
    .sq-dirt  { background: #e8d5a0; }
    .bunny {
      position: absolute;
      width: 54px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      z-index: 20;
      pointer-events: none;
      transition: all 0.6s cubic-bezier(0.25,0.1,0.25,1);
    }
    @keyframes slowHop {
      0%,100%{transform:translateY(0) scale(1)}
      40%{transform:translateY(-30px) scale(1.2)}
      60%{transform:translateY(-30px) scale(1.2)}
    }
    .hopping { animation: slowHop 0.65s ease-in-out; }

    @keyframes sadShake {
      0%,100%{transform:translateX(0) rotate(0deg)}
      20%{transform:translateX(-8px) rotate(-10deg)}
      40%{transform:translateX(8px) rotate(10deg)}
      60%{transform:translateX(-6px) rotate(-6deg)}
      80%{transform:translateX(6px) rotate(6deg)}
    }
    .shaking { animation: sadShake 0.6s ease-in-out; }

    .heart-fx {
      position: absolute;
      font-size: 20px;
      pointer-events: none;
      z-index: 30;
      opacity: 0;
    }
    @keyframes heartUp {
      0%{opacity:0;transform:translateY(0)}
      20%{opacity:1}
      100%{opacity:0;transform:translateY(-50px)}
    }
    .heart-go { animation: heartUp 0.9s ease-out forwards; }
    @keyframes confettiBurst {
      0%{opacity:1;transform:scale(0) rotate(0deg)}
      100%{opacity:0;transform:scale(2.5) rotate(360deg)}
    }
    .confetti {
      position: absolute;
      pointer-events: none;
      z-index: 35;
      font-size: 18px;
      animation: confettiBurst 0.8s ease-out forwards;
    }
    .code-section {
      padding: 6px 10px 10px;
      background: #f0f8e8;
      border-radius: 14px 14px 0 0;
    }
    .cnt-badge { font-size: 11px; color: #888; text-align: right; margin-bottom: 3px; }
    .drop-frame {
      min-height: 60px;
      max-height: 84px;
      background: #fff;
      border: 2.5px dashed #bbb;
      border-radius: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 7px;
      margin-bottom: 8px;
      overflow-y: auto;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-frame.drag-over { border-color: #2196F3; background: #e3f2fd; }
    .drop-frame.reject { border-color: #f44336; background: #ffebee; }
    .chip {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      cursor: grab;
      user-select: none;
      flex-shrink: 0;
      transition: transform 0.15s, opacity 0.15s;
      border-bottom: 3px solid rgba(0,0,0,0.25);
      color: white;
    }
    .chip.active-step {
      transform: scale(1.35);
      border: 3px solid #FFD700;
      border-bottom: 4px solid #b8860b;
      box-shadow: 0 0 0 3px rgba(255,215,0,0.5);
      z-index: 10;
    }
    .chip.done-step { opacity: 0.38; transform: scale(0.88); }
    .chip.dragging { opacity: 0.3; transform: scale(0.8); }
    @keyframes chipOut {
      0%{transform:scale(1) rotate(0deg);opacity:1}
      100%{transform:scale(0) rotate(25deg);opacity:0}
    }
    .chip.removing { animation: chipOut 0.28s ease-in forwards; pointer-events: none; }
    .chip-UP    { background: #e53935; border-bottom-color: #8b0000; }
    .chip-DOWN  { background: #8E24AA; border-bottom-color: #4a0072; }
    .chip-LEFT  { background: #F57C00; border-bottom-color: #7f3b00; }
    .chip-RIGHT { background: #1E88E5; border-bottom-color: #0d3f7a; }
    .arrow-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 8px;
    }
    .arr-src {
      width: 54px;
      height: 54px;
      border: none;
      border-radius: 14px;
      font-size: 22px;
      cursor: grab;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .arr-UP    { background: #e53935; box-shadow: 0 6px 0 #8b0000; }
    .arr-DOWN  { background: #8E24AA; box-shadow: 0 6px 0 #4a0072; }
    .arr-LEFT  { background: #F57C00; box-shadow: 0 6px 0 #7f3b00; }
    .arr-RIGHT { background: #1E88E5; box-shadow: 0 6px 0 #0d3f7a; }
    .arr-src:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.3) !important; }
    .go-btn {
      width: 100%;
      background: #4CAF50;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 24px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 5px 0 #2e7d32;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .go-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d32; }

    /* MODAL OVERLAY */
    .modal-ov {
      position: absolute;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.75);
      z-index: 500;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-ov.show { display: flex; }
    .modal-card {
      background: white;
      padding: 28px 22px;
      border-radius: 28px;
      text-align: center;
      width: 100%;
    }
    @keyframes popIn {
      from{transform:scale(0.4);opacity:0}
      to{transform:scale(1);opacity:1}
    }
    .modal-card { animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }

    .modal-btn {
      width: 100%;
      border: none;
      padding: 14px;
      border-radius: 24px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn-green { background: #4CAF50; color: white; box-shadow: 0 5px 0 #2e7d32; }
    .btn-orange { background: #FF9800; color: white; box-shadow: 0 5px 0 #e65100; }

    /* EDITOR */
    .edit-tray {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: white;
      border-top: 4px solid #2196F3;
      padding: 12px;
      transform: translateY(100%);
      transition: transform 0.3s;
      z-index: 200;
      border-radius: 18px 18px 0 0;
    }
    .edit-tray.open { transform: translateY(0); }
    .tool-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 10px; }
    .tool-btn { width: 48px; height: 48px; border: 2px solid #ddd; border-radius: 12px; background: white; font-size: 22px; cursor: pointer; }
    .tool-btn.sel { border-color: #2196F3; background: #e3f2fd; }
    .save-btn { width: 100%; background: #2196F3; color: white; border: none; padding: 10px; border-radius: 10px; font-weight: 700; cursor: pointer; }

    /* PASSWORD */
    .pw-ov {
      position: absolute; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.7); z-index: 600;
      display: none; align-items: center; justify-content: center;
    }
    .pw-ov.show { display: flex; }
    .pw-card { background: white; padding: 24px 20px; border-radius: 22px; text-align: center; width: 240px; }
    .pw-input { width: 100%; padding: 10px 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 18px; text-align: center; letter-spacing: 4px; outline: none; margin-bottom: 8px; }
    .pw-input:focus { border-color: #2196F3; }
    .pw-err { color: #f44336; font-size: 12px; font-weight: 700; margin-bottom: 8px; display: none; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
    .pw-btns { display: flex; gap: 8px; }
    .pw-ok { flex:1; background: #2196F3; color: white; border: none; padding: 10px; border-radius: 10px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 0 #0d47a1; }
    .pw-cancel { flex:1; background: #eee; color: #555; border: none; padding: 10px; border-radius: 10px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
<div class="phone">

  <!-- HARİTA EKRANI -->
  <div id="sMap" class="scr on">
    <div class="map-header">
      <span style="font-size:19px;font-weight:700;color:#2e7d32">🐰 Havuç Avı</span>
      <span id="scoreDisp" style="font-weight:700;color:#4CAF50">🥕 0</span>
    </div>
    <div class="lvl-grid" id="lvlGrid"></div>
  </div>

  <!-- OYUN EKRANI -->
  <div id="sPlay" class="scr">
    <div class="play-header">
      <button onclick="goMap()" style="border:none;background:none;font-size:21px;cursor:pointer;">🏠</button>
      <b id="lvlLabel">Bölüm 1</b>
      <button onclick="toggleEdit()" style="border:none;background:none;font-size:21px;cursor:pointer;">⚙️</button>
    </div>

    <div class="board" id="board">
      <div id="bunny" class="bunny">🐰</div>
      <div id="heartFx" class="heart-fx">❤️</div>
    </div>

    <div class="code-section">
      <div class="cnt-badge"><span id="cntBadge">0</span> / 20 — çerçeve dışına sürükle = sil</div>
      <div class="drop-frame" id="dropZone"
        ondragover="onDZOver(event)"
        ondragleave="onDZLeave(event)"
        ondrop="onDZDrop(event)"></div>
      <div class="arrow-row">
        <button class="arr-src arr-UP"    draggable="true" ondragstart="srcDrag(event,'UP')"    onclick="addCmd('UP')">⬆️</button>
        <button class="arr-src arr-LEFT"  draggable="true" ondragstart="srcDrag(event,'LEFT')"  onclick="addCmd('LEFT')">⬅️</button>
        <button class="arr-src arr-DOWN"  draggable="true" ondragstart="srcDrag(event,'DOWN')"  onclick="addCmd('DOWN')">⬇️</button>
        <button class="arr-src arr-RIGHT" draggable="true" ondragstart="srcDrag(event,'RIGHT')" onclick="addCmd('RIGHT')">➡️</button>
      </div>
      <button class="go-btn" onclick="runCode()">🚀 BAŞLAT</button>
    </div>

    <!-- BAŞARI MODALI -->
    <div id="winModal" class="modal-ov">
      <div class="modal-card">
        <div style="font-size:50px">🎉</div>
        <h2 style="color:#4CAF50;margin:8px 0 4px;font-size:22px">MÜKEMMEL!</h2>
        <p style="color:#666;font-size:13px">Tüm havuçlar toplandı!</p>
        <div style="font-size:30px;color:#FFD700;margin:10px 0">⭐⭐⭐</div>
        <button class="modal-btn btn-green" onclick="goNext()">BİR SONRAKİ BÖLÜM ➔</button>
      </div>
    </div>

    <!-- HATA MODALI -->
    <div id="failModal" class="modal-ov">
      <div class="modal-card">
        <div id="failBunny" style="font-size:50px">🐰</div>
        <h2 id="failTitle" style="color:#FF9800;margin:8px 0 4px;font-size:20px">OLMADI!</h2>
        <p id="failMsg" style="color:#666;font-size:13px;margin-bottom:4px">Tekrar dene!</p>
        <button class="modal-btn btn-orange" onclick="retryLvl()">🔄 TEKRAR DENE</button>
      </div>
    </div>

    <!-- EDITOR TRAY -->
    <div class="edit-tray" id="editTray">
      <div style="text-align:center;font-weight:700;margin-bottom:9px;color:#2196F3">🛠️ HARİTAYI DÜZENLE</div>
      <div class="tool-row">
        <button class="tool-btn sel" id="tB" onclick="selTool('B')">🐰</button>
        <button class="tool-btn" id="tC" onclick="selTool('C')">🥕</button>
        <button class="tool-btn" id="tR" onclick="selTool('R')">🪨</button>
        <button class="tool-btn" id="tX" onclick="selTool('X')">❌</button>
      </div>
      <button class="save-btn" onclick="toggleEdit()">✅ KAYDET VE KAPAT</button>
    </div>

    <!-- ŞİFRE MODALI -->
    <div id="pwOv" class="pw-ov">
      <div class="pw-card">
        <div style="font-size:30px;margin-bottom:6px">🔐</div>
        <h3 style="color:#2196F3;margin-bottom:6px;font-size:16px">Editör Şifresi</h3>
        <p style="color:#888;font-size:12px;margin-bottom:14px">Bu alan yalnızca öğretmenler içindir</p>
        <input id="pwInput" class="pw-input" type="password" placeholder="••••••"
          onkeydown="if(event.key==='Enter')checkPw()">
        <div id="pwErr" class="pw-err">❌ Yanlış şifre!</div>
        <div class="pw-btns">
          <button class="pw-cancel" onclick="closePw()">İptal</button>
          <button class="pw-ok" onclick="checkPw()">Giriş ✓</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var G = {
  unlocked: 1, done: [], lvls: [],
  cur: 0, tool: 'B', running: false,
  pos: {r:4,c:0}, cmds: [],
  dragSrcIdx: -1, dragFromSrc: false,
  activeStep: -1, editorUnlocked: false
};

var DIR_COLORS = { UP:'chip-UP', DOWN:'chip-DOWN', LEFT:'chip-LEFT', RIGHT:'chip-RIGHT' };
var DIR_ARROWS = { UP:'↑', DOWN:'↓', LEFT:'←', RIGHT:'→' };

/* ── SES ── */
var _ctx = null;
function getCtx() {
  if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (_ctx.state === 'suspended') _ctx.resume();
  return _ctx;
}
function playTone(freq, type, dur, vol, delay) {
  try {
    var ctx = getCtx();
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, ctx.currentTime + (delay||0));
    g.gain.setValueAtTime(vol||0.2, ctx.currentTime + (delay||0));
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (delay||0) + dur);
    o.start(ctx.currentTime + (delay||0));
    o.stop(ctx.currentTime + (delay||0) + dur);
  } catch(e) {}
}
function playSound(type) {
  try {
    if (type === 'hop') {
      playTone(520, 'sine', 0.18, 0.18);
      playTone(320, 'sine', 0.12, 0.08, 0.1);
    } else if (type === 'eat') {
      playTone(660, 'triangle', 0.1, 0.2);
      playTone(880, 'triangle', 0.15, 0.2, 0.1);
      playTone(1100,'triangle', 0.2,  0.15, 0.22);
    } else if (type === 'win') {
      [523,659,784,1047].forEach(function(f,i){ playTone(f,'triangle',0.3,0.2,i*0.13); });
    } else if (type === 'rock') {
      playTone(180,'sawtooth',0.12,0.25);
      playTone(100,'sawtooth',0.18,0.2,0.1);
    } else if (type === 'sad') {
      playTone(400,'sine',0.15,0.18);
      playTone(300,'sine',0.2, 0.15,0.15);
      playTone(220,'sine',0.25,0.12,0.32);
    }
  } catch(e) {}
}

/* ── BÖLÜMLER ── */
function mkLvls() {
  var maps = [
    {s:{r:4,c:0},ca:[{r:3,c:0}],ro:[]},
    {s:{r:4,c:0},ca:[{r:4,c:1}],ro:[]},
    {s:{r:4,c:0},ca:[{r:2,c:0}],ro:[]},
    {s:{r:0,c:0},ca:[{r:0,c:1}],ro:[]},
    {s:{r:4,c:4},ca:[{r:3,c:4}],ro:[]},
    {s:{r:4,c:0},ca:[{r:4,c:2}],ro:[]},
    {s:{r:0,c:0},ca:[{r:2,c:0}],ro:[]},
    {s:{r:4,c:0},ca:[{r:3,c:1}],ro:[]},
    {s:{r:4,c:0},ca:[{r:2,c:2}],ro:[]},
    {s:{r:4,c:0},ca:[{r:0,c:0}],ro:[]},
    {s:{r:4,c:0},ca:[{r:0,c:4}],ro:[]},
    {s:{r:4,c:0},ca:[{r:0,c:2}],ro:[]},
    {s:{r:4,c:0},ca:[{r:2,c:4}],ro:[]},
    {s:{r:4,c:0},ca:[{r:0,c:4},{r:4,c:4}],ro:[]},
    {s:{r:4,c:0},ca:[{r:0,c:4}],ro:[{r:2,c:2}]},
    {s:{r:4,c:0},ca:[{r:0,c:4}],ro:[{r:1,c:2},{r:3,c:2}]},
    {s:{r:4,c:0},ca:[{r:0,c:4},{r:0,c:0}],ro:[{r:2,c:2}]},
    {s:{r:4,c:0},ca:[{r:0,c:4}],ro:[{r:2,c:1},{r:2,c:2},{r:2,c:3}]},
    {s:{r:0,c:0},ca:[{r:4,c:4}],ro:[{r:2,c:2}]},
    {s:{r:4,c:0},ca:[{r:0,c:4},{r:2,c:2}],ro:[{r:1,c:1},{r:3,c:3}]},
    {s:{r:4,c:0},ca:[{r:0,c:4}],ro:[{r:1,c:2},{r:2,c:2},{r:3,c:2}]},
    {s:{r:0,c:4},ca:[{r:4,c:0}],ro:[{r:2,c:2},{r:1,c:1}]},
    {s:{r:4,c:0},ca:[{r:0,c:0},{r:0,c:4}],ro:[{r:2,c:1},{r:2,c:3}]},
    {s:{r:4,c:2},ca:[{r:0,c:0},{r:0,c:4}],ro:[{r:2,c:2}]},
    {s:{r:4,c:0},ca:[{r:0,c:4},{r:4,c:4},{r:0,c:0}],ro:[{r:2,c:2}]},
    {s:{r:4,c:0},ca:[{r:0,c:4}],ro:[{r:1,c:1},{r:2,c:2},{r:3,c:3}]},
    {s:{r:2,c:0},ca:[{r:0,c:4},{r:4,c:4}],ro:[{r:1,c:2},{r:3,c:2}]},
    {s:{r:4,c:0},ca:[{r:0,c:2},{r:0,c:4}],ro:[{r:2,c:0},{r:2,c:1},{r:2,c:3}]},
    {s:{r:4,c:0},ca:[{r:0,c:4},{r:2,c:4}],ro:[{r:1,c:2},{r:3,c:2},{r:2,c:1}]},
    {s:{r:4,c:0},ca:[{r:0,c:0},{r:0,c:2},{r:0,c:4}],ro:[{r:2,c:1},{r:2,c:3}]}
  ];
  for (var i = 0; i < 60; i++) {
    var m = maps[i % maps.length];
    G.lvls.push({
      start: {r:m.s.r, c:m.s.c},
      carrots: m.ca.map(function(c){ return {r:c.r,c:c.c,eaten:false}; }),
      rocks: m.ro.map(function(r){ return {r:r.r,c:r.c}; })
    });
  }
}

/* ── HARİTA ── */
function goMap() {
  document.getElementById('sMap').classList.add('on');
  document.getElementById('sPlay').classList.remove('on');
  drawMap();
}
function drawMap() {
  var g = document.getElementById('lvlGrid');
  g.innerHTML = '';
  for (var i = 0; i < 60; i++) {
    (function(idx){
      var d = document.createElement('div');
      var isOpen = (idx+1) <= G.unlocked;
      var isDone = G.done.indexOf(idx+1) >= 0;
      d.className = 'lc'+(isOpen?' open':'')+(isDone?' done':'');
      d.innerText = idx+1;
      if (isOpen) d.onclick = function(){ startLvl(idx); };
      g.appendChild(d);
    })(i);
  }
  document.getElementById('scoreDisp').innerText = '🥕 '+G.done.length;
}

/* ── BÖLÜM BAŞLAT ── */
function startLvl(idx) {
  G.cur = idx;
  var l = G.lvls[idx];
  l.carrots.forEach(function(c){ c.eaten=false; });
  G.pos = {r:l.start.r, c:l.start.c};
  G.cmds = [];
  G.running = false;
  G.activeStep = -1;
  document.getElementById('lvlLabel').innerText = 'Bölüm '+(idx+1);
  document.getElementById('dropZone').innerHTML = '';
  document.getElementById('cntBadge').innerText = '0';
  document.getElementById('winModal').classList.remove('show');
  document.getElementById('failModal').classList.remove('show');
  document.getElementById('editTray').classList.remove('open');
  document.getElementById('pwOv').classList.remove('show');
  document.getElementById('bunny').innerText = '🐰';
  document.getElementById('sMap').classList.remove('on');
  document.getElementById('sPlay').classList.add('on');
  drawBoard();
}

/* ── TAHTA ── */
function drawBoard() {
  var board = document.getElementById('board');
  board.querySelectorAll('.sq').forEach(function(s){ s.remove(); });
  var l = G.lvls[G.cur];
  for (var i = 0; i < 25; i++) {
    (function(r,c){
      var sq = document.createElement('div');
      sq.className = 'sq '+((r+c)%2===0?'sq-grass':'sq-dirt');
      sq.onclick = function(){ onSqClick(r,c); };
      if (l.carrots.some(function(h){ return h.r===r&&h.c===c&&!h.eaten; })) sq.innerText='🥕';
      if (l.rocks.some(function(rk){ return rk.r===r&&rk.c===c; })){
        sq.innerText='🪨'; sq.style.background='#c8b89a';
      }
      board.appendChild(sq);
    })(Math.floor(i/5), i%5);
  }
  moveBunny();
}
function moveBunny() {
  var b = document.getElementById('bunny');
  b.style.top  = (G.pos.r*57+4)+'px';
  b.style.left = (G.pos.c*57+4)+'px';
}
function spawnConfetti(r,c) {
  var board = document.getElementById('board');
  ['🌟','✨','🎊','💛','🌈'].forEach(function(em,i){
    var el = document.createElement('div');
    el.className='confetti';
    el.innerText=em;
    el.style.top  = (r*57+4+Math.random()*20-10)+'px';
    el.style.left = (c*57+4+Math.random()*20-10)+'px';
    el.style.animationDelay=(i*0.08)+'s';
    board.appendChild(el);
    setTimeout(function(){ el.remove(); },900);
  });
}

/* ── EDİTÖR ── */
function toggleEdit() {
  var tray = document.getElementById('editTray');
  if (tray.classList.contains('open')){ tray.classList.remove('open'); return; }
  if (G.editorUnlocked){ tray.classList.add('open'); return; }
  document.getElementById('pwOv').classList.add('show');
  document.getElementById('pwInput').value='';
  document.getElementById('pwErr').style.display='none';
  setTimeout(function(){ document.getElementById('pwInput').focus(); },100);
}
function checkPw() {
  if (document.getElementById('pwInput').value==='sifigu') {
    G.editorUnlocked=true;
    document.getElementById('pwOv').classList.remove('show');
    document.getElementById('editTray').classList.add('open');
  } else {
    var err=document.getElementById('pwErr');
    err.style.display='block';
    document.getElementById('pwInput').value='';
    err.style.animation='none'; void err.offsetWidth; err.style.animation='shake 0.4s ease';
  }
}
function closePw(){ document.getElementById('pwOv').classList.remove('show'); }
function selTool(t) {
  G.tool=t;
  ['B','C','R','X'].forEach(function(x){ document.getElementById('t'+x).classList.remove('sel'); });
  document.getElementById('t'+t).classList.add('sel');
}
function onSqClick(r,c) {
  if (!document.getElementById('editTray').classList.contains('open')) return;
  var l=G.lvls[G.cur];
  if (G.tool==='B'){ l.start={r:r,c:c}; G.pos={r:r,c:c}; }
  else if (G.tool==='C'){ if(!l.carrots.some(function(h){return h.r===r&&h.c===c;})) l.carrots.push({r:r,c:c,eaten:false}); }
  else if (G.tool==='R'){ if(!l.rocks.some(function(rk){return rk.r===r&&rk.c===c;})) l.rocks.push({r:r,c:c}); }
  else if (G.tool==='X'){ l.carrots=l.carrots.filter(function(h){return!(h.r===r&&h.c===c);}); l.rocks=l.rocks.filter(function(rk){return!(rk.r===r&&rk.c===c);}); }
  drawBoard();
}

/* ── SÜRÜKLE BIRAK ── */
function srcDrag(e,dir){ G.dragFromSrc=true; G.dragSrcIdx=-1; e.dataTransfer.setData('dir',dir); }
function onDZOver(e){ e.preventDefault(); document.getElementById('dropZone').classList.add('drag-over'); }
function onDZLeave(e){ var z=document.getElementById('dropZone'); if(!z.contains(e.relatedTarget)) z.classList.remove('drag-over'); }
function onDZDrop(e){
  e.preventDefault();
  var z=document.getElementById('dropZone');
  z.classList.remove('drag-over');
  if(G.cmds.length>=20){ flashReject(z); return; }
  var dir=e.dataTransfer.getData('dir');
  if(dir) addCmdDirect(dir);
}
document.addEventListener('dragover',function(e){e.preventDefault();});
document.addEventListener('drop',function(e){
  var z=document.getElementById('dropZone');
  if(z&&!z.contains(e.target)&&G.dragSrcIdx>=0){ removeChip(G.dragSrcIdx); G.dragSrcIdx=-1; }
});
function flashReject(zone){ zone.classList.add('reject'); setTimeout(function(){zone.classList.remove('reject');},500); }
function addCmd(dir){ if(G.running||G.cmds.length>=20) return; addCmdDirect(dir); }
function addCmdDirect(dir){ if(G.cmds.length>=20) return; G.cmds.push(dir); renderChips(-1); }
function renderChips(activeIdx) {
  var z=document.getElementById('dropZone');
  z.innerHTML='';
  G.cmds.forEach(function(dir,idx){ z.appendChild(makeChip(dir,idx,activeIdx)); });
  document.getElementById('cntBadge').innerText=G.cmds.length;
  if(activeIdx>=0){ var chips=z.querySelectorAll('.chip'); if(chips[activeIdx]) chips[activeIdx].scrollIntoView({block:'nearest',inline:'center'}); }
}
function makeChip(dir,idx,activeIdx) {
  var chip=document.createElement('div');
  chip.className='chip '+DIR_COLORS[dir];
  if(idx===activeIdx) chip.classList.add('active-step');
  else if(activeIdx>=0&&idx<activeIdx) chip.classList.add('done-step');
  chip.draggable=true;
  chip.innerText=DIR_ARROWS[dir];
  chip.ondragstart=function(e){ G.dragFromSrc=false; G.dragSrcIdx=idx; e.dataTransfer.setData('dir',dir); chip.classList.add('dragging'); };
  chip.ondragend=function(){ chip.classList.remove('dragging'); };
  return chip;
}
function removeChip(idx) {
  var z=document.getElementById('dropZone');
  var chips=Array.from(z.querySelectorAll('.chip'));
  if(chips[idx]){ chips[idx].classList.add('removing'); setTimeout(function(){ G.cmds.splice(idx,1); renderChips(-1); },260); }
}

/* ── HATA MODALI ── */
function showFail(title, msg) {
  var b = document.getElementById('bunny');
  b.classList.remove('hopping');
  b.classList.add('shaking');
  b.innerText = '🐰';
  setTimeout(function(){ b.classList.remove('shaking'); }, 700);

  document.getElementById('failTitle').innerText = title;
  document.getElementById('failMsg').innerText = msg;
  document.getElementById('failModal').classList.add('show');
}
function retryLvl() {
  document.getElementById('failModal').classList.remove('show');
  startLvl(G.cur);
}

/* ── KOD ÇALIŞTIR ── */
async function runCode() {
  if (G.running || !G.cmds.length) return;
  // AudioContext'i kullanıcı etkileşimiyle başlat
  try { getCtx(); } catch(e){}
  G.running = true;
  var l = G.lvls[G.cur];
  var b = document.getElementById('bunny');
  var h = document.getElementById('heartFx');
  b.innerText = '🐰';

  for (var i = 0; i < G.cmds.length; i++) {
    renderChips(i);
    var step = G.cmds[i];
    var nr = G.pos.r, nc = G.pos.c;
    if (step==='UP'    && nr>0) nr--;
    if (step==='DOWN'  && nr<4) nr++;
    if (step==='LEFT'  && nc>0) nc--;
    if (step==='RIGHT' && nc<4) nc++;

    if (l.rocks.some(function(rk){ return rk.r===nr&&rk.c===nc; })) {
      playSound('rock');
      G.running = false;
      renderChips(-1);
      setTimeout(function(){ showFail('KAYA! 🪨', 'Yolda bir kaya var, başka bir yol dene!'); }, 300);
      return;
    }

    G.pos.r=nr; G.pos.c=nc;
    playSound('hop');
    b.classList.remove('hopping');
    void b.offsetWidth;
    b.classList.add('hopping');
    moveBunny();

    var ci=-1;
    for (var j=0; j<l.carrots.length; j++) {
      if (!l.carrots[j].eaten && l.carrots[j].r===nr && l.carrots[j].c===nc){ ci=j; break; }
    }
    if (ci>=0) {
      l.carrots[ci].eaten=true;
      playSound('eat');
      h.style.top  = (nr*57+4)+'px';
      h.style.left = (nc*57+4)+'px';
      h.classList.remove('heart-go');
      void h.offsetWidth;
      h.classList.add('heart-go');
      spawnConfetti(nr,nc);
      drawBoard();
    }

    await new Promise(function(res){ setTimeout(res,700); });
    b.classList.remove('hopping');
  }

  renderChips(-1);

  if (l.carrots.every(function(c){ return c.eaten; })) {
    if (G.done.indexOf(G.cur+1)<0) G.done.push(G.cur+1);
    if (G.unlocked===(G.cur+1)) G.unlocked++;
    playSound('win');
    document.getElementById('winModal').classList.add('show');
  } else {
    playSound('sad');
    showFail('OLMADI! 😢', 'Bazı havuçlar hâlâ orada duruyor!');
  }
  G.running = false;
}

function goNext() {
  document.getElementById('winModal').classList.remove('show');
  if (G.cur<59) startLvl(G.cur+1); else goMap();
}

mkLvls();
drawMap();
</script>
